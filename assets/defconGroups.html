<!DOCTYPE html>
<html lang="en">
<head>
	<base target="_top">
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Quick Start - Leaflet</title>
	<link rel="shortcut icon" type="image/x-icon" href="docs/images/favicon.ico" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
	<style>
		html, body {
			height: 100%;
			margin: 0;
		}
		.leaflet-container {
			height: 400px;
			width: 600px;
			max-width: 100%;
			max-height: 100%;
		}
	</style>	
</head>
<body>
<div id="map"></div>
<script>
	const map = L.map('map').setView([40.005237177547585, -99.14974129880208], 3.5);

	const tiles = L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
		maxZoom: 19,
		attribution: '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>'
	}).addTo(map);

	// Array of marker coordinates and popup content  
	const markers = [

			popupContent: "<b>DC724 | dc724.org</b><br>Hackers Guild<br>2247 Babcock Blvd, Pittsburgh, PA 15237"

		{

		},  
		{  
			lat: 28.53472928921568,
			lng: -81.38021067158927,

		{

			lng: -74.34214972435784,
			popupContent: "<b>DC908 | defcon908.org</b><br>Westfield Memorial Library<br>550 E Broad St, Westfield, NJ 07090"
		},  
		{

			popupContent: "<b>DC281 | dc281.org</b><br>Saloon Door West<br>1231 Broadway St, Pearland, TX 77581"

			lat: 30.37993619967425,

			popupContent: "<b>DC512 | ???</b><br>Celis Brewery<br>10001 Metric Blvd, Austin, TX 78758"
		}
	];

	// Loop through the markers array and add each to the map  
	markers.forEach(marker => {  
		L.marker([marker.lat, marker.lng])   // Create marker with coordinates  
			.addTo(map)                     // Add marker to the map  
			.bindPopup(marker.popupContent); // Attach popup  
	});
</script>
</body>
</html>
